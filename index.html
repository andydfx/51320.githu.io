<!DOCTYPE html>

    <title>我的个人主页</title>
    <style>
        /* 基础样式：居中、简洁 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f5;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        /* 头像样式 */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            object-fit: cover;
            border: 3px solid #000000;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        /* 标题样式 */
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .desc {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            max-width: 500px;
        }
        /* 链接按钮样式 */
        .links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .link-btn {
            padding: 10px 25px;
            background: #409eff;
            color: rgb(11, 2, 100);
            text-decoration: none;
            border-radius: 30px;
            transition: 0.3s;
        }
        .link-btn:hover {
            background: #337ecc;
            transform: translateY(-2px);
        }
    </style>
</head>
