        * {
            margin: 0;

        body {
            background-color: #f8f9fa;

        .card {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 40px 20px;
            text-align: center;
        }
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;

            margin: 0 auto 25px;

        }
        h1 {

        }
        .intro {
            font-size: 15px;
            color: #555;
            max-width: 450px;
            margin: 0 auto 35px;
            line-height: 1.8;
        }
        .contact {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 35px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 14px;
            color: #444;
            text-decoration: none;
            transition: all 0.3s;
        }
        .contact-item:hover {
            background: #e8f4f8;
            color: #007bff;
            transform: translateY(-2px);
        }
        .contact-item i {
            font-size: 16px;
        }
        .social {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .social-link {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            text-decoration: none;
            font-size: 20px;
            transition: all 0.3s;
        }
        .social-link:hover {
            background: #007bff;
            color: white;
            transform: rotate(15deg);
        }
        .footer {
            font-size: 13px;
            color: #999;
            margin-top: 20px;
        }
        /* 适配手机 */
        @media (max-width: 480px) {
            .card {
                margin: 20px auto;
                padding: 30px 15px;
            }
            .avatar {
                width: 120px;
                height: 120px;
            }
            h1 {
                font-size: 24px;
            }
            .contact {
                gap: 10px;
            }
            .contact-item {
                padding: 8px 14px;
                font-size: 13px;
            }
            .social-link {
                width: 42px;
                height: 42px;
                font-size: 18px;
            }
